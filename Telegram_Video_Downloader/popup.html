<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 220px; padding: 10px; font-family: sans-serif; text-align: center; }
        button { 
            background: #2AABEE; color: white; border: none; 
            padding: 10px 15px; border-radius: 5px; cursor: pointer; 
            font-size: 14px; font-weight: bold; width: 100%;
        }
        button:hover { background: #1c93d4; }
        #status { margin-top: 10px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <button id="downloadBtn">Скачать видео</button>
    <div id="status">Откройте видео в Telegram и нажмите кнопку</div>
    <script src="popup.js"></script>
</body>
</html>
